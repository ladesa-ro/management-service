name: "[DEV] Build, Push & Deploy"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-deploy.dev.yml
      - .deploy/**/*
      - src/**/*
      - .docker/**/*

concurrency:
  group: build-deploy-dev

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}
  REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  IMAGE_BASENAME: ${{ github.repository }}

jobs:
  ci:
    name: "CI: Build & Push"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: "[CI] Checkout do código-fonte"
        uses: actions/checkout@v5

      - name: "[CI] Set up QEMU"
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: "[CI] Set up Docker Buildx"
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: "[CI] Autenticação no GitHub Container Registry"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_TOKEN }}

      - name: "[CI] Construção e publicação da imagem de contêiner"
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./src/
          file: .docker/Containerfile
          target: service-runtime
          push: true
          build-args: |
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT_HASH=${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/management-service:development
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/management-service:cache-development
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_BASENAME }}/management-service:cache-development,mode=max

  cd:
    name: "CD: Deploy"
    runs-on: dev-deploy
    permissions:
      contents: read
    needs: [ ci ]
    environment:
      name: development
      url: ${{ vars.DEPLOY_URL }}
    steps:
      - name: "[CD] Checkout do código-fonte"
        uses: actions/checkout@v5

      - name: "[CD] Implantação"
        shell: bash
        working-directory: ./.deploy/development/
        run: bash ./deploy.sh
